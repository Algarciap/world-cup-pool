name: Sync World Cup Results

on:
  # Runs ~30 min after each WC 2026 match window closes.
  # All times in UTC (Madrid CEST = UTC+2 during the tournament).
  #   18:30 UTC = 20:30 Madrid  — after the 16:00 UTC kickoffs
  #   21:30 UTC = 23:30 Madrid  — after the 19:00 UTC kickoffs
  #   00:30 UTC = 02:30 Madrid  — after the 22:00 UTC kickoffs
  #   03:30 UTC = 05:30 Madrid  — after the 01:00 UTC kickoffs
  schedule:
    - cron: "30 18 * * *"
    - cron: "30 21 * * *"
    - cron: "30 0  * * *"
    - cron: "30 3  * * *"

  # Allows triggering a manual run from the GitHub Actions UI at any time.
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync results from ESPN
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/sync_results.py
